<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TAI Neural Mind">
  <defs>
    <radialGradient id="nm-bg" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0%"  stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <pattern id="nm-dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#0EA5E9" opacity="0.18"/>
    </pattern>
    <filter id="nm-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="44" fill="url(#nm-bg)"/>
  <rect width="256" height="256" rx="44" fill="url(#nm-dots)"/>

  <g stroke="#10B981" stroke-width="1.4" opacity="0.55">
    <line x1="64"  y1="92"  x2="128" y2="92"/>
    <line x1="64"  y1="92"  x2="128" y2="128"/>
    <line x1="64"  y1="92"  x2="128" y2="164"/>
    <line x1="64"  y1="128" x2="128" y2="92"/>
    <line x1="64"  y1="128" x2="128" y2="128"/>
    <line x1="64"  y1="128" x2="128" y2="164"/>
    <line x1="64"  y1="164" x2="128" y2="92"/>
    <line x1="64"  y1="164" x2="128" y2="128"/>
    <line x1="64"  y1="164" x2="128" y2="164"/>
    <line x1="128" y1="92"  x2="184" y2="78"/>
    <line x1="128" y1="128" x2="184" y2="138"/>
    <line x1="128" y1="164" x2="184" y2="178"/>
  </g>

  <rect x="34"  y="58"  width="64" height="13" rx="3" fill="#FFFFFF"/>
  <rect x="58"  y="58"  width="14" height="142" rx="3" fill="#FFFFFF"/>
  <g fill="#0EA5E9" stroke="#FFFFFF" stroke-width="2.5">
    <circle cx="64" cy="92"  r="7.5"/>
    <circle cx="64" cy="128" r="7.5"/>
    <circle cx="64" cy="164" r="7.5"/>
  </g>

  <path d="M 132 200 L 184 60 L 236 200"
        fill="none" stroke="#8B5CF6" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="146" y1="160" x2="222" y2="160"
        stroke="#8B5CF6" stroke-width="10" stroke-linecap="round"/>

  <g fill="#10B981" filter="url(#nm-glow)">
    <circle cx="128" cy="92"  r="5"/>
    <circle cx="128" cy="128" r="5"/>
    <circle cx="128" cy="164" r="5"/>
  </g>

  <circle cx="184" cy="60" r="9" fill="#10B981" stroke="#FFFFFF" stroke-width="2.5"/>
